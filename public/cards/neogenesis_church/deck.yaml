description: >
  Apsyntion’s oldest human-native faith, fanatically xenophobic toward alien and
  machine alike. The Maestra leads religion and war; the Choir and Inquisitors
  enforce doctrine in scattered chapels, preaching that Wormwood is the key to
  humanity’s return to Old Terra’s garden.
