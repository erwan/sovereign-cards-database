description: >
  They settle the fungal wastes’ most toxic psychoactive zones and Lilin husks,
  obeying laws shaped by semi-aware xenofungus. Initiates splice mycelium into
  flesh until the network owns their nerves—gaining strength and spore-born
  “telepathy” while spreading infection toward a holy end to mankind.
